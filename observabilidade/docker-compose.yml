networks:
  obs-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

services:
  # ─────────────────────────────────────────────
  # Prometheus — coleta e armazena métricas
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: obs-prometheus
    restart: unless-stopped
    networks: [obs-net]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.listen-address=0.0.0.0:9090'
    extra_hosts:
      - "host-gateway:172.17.0.1"

  # ─────────────────────────────────────────────
  # Grafana — dashboards e alertas
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: obs-grafana
    restart: unless-stopped
    networks: [obs-net]
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-}
      GF_SMTP_USER: ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus]

  # ─────────────────────────────────────────────
  # Node Exporter — métricas do servidor Linux
  # Na mesma rede Docker (obs-net) para evitar problemas de firewall
  # Acessa métricas do host via volume mounts de /proc e /sys
  # ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: obs-node-exporter
    restart: unless-stopped
    networks: [obs-net]
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|snap)($|/)'
    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

  # ─────────────────────────────────────────────
  # Loki — armazenamento de logs (Fase 3)
  # ─────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: obs-loki
    restart: unless-stopped
    networks: [obs-net]
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ─────────────────────────────────────────────
  # Promtail — coleta logs do PM2 e envia ao Loki (Fase 3)
  # Ajustar PM2_LOGS_PATH conforme o servidor
  # ─────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: obs-promtail
    restart: unless-stopped
    networks: [obs-net]
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ${PM2_LOGS_PATH:-/home/ubuntu/plataform-backend/logs}:/var/log/pm2:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
