name: CI + Smoke Tests

on:
  push:
    branches: [ '*' ]  # Executa em TODAS as branches
  pull_request:
    branches: [ '*' ]  # Executa em PRs para qualquer branch
  workflow_dispatch: # Permite execução manual

jobs:
  # ============================================
  # JOB 1: Verificar Backend
  # ============================================
  backend-smoke-tests:
    name: Backend - Compilação e Estrutura
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BackEnd/package-lock.json
      
      - name: 📥 Instalar dependências do Backend
        working-directory: BackEnd
        run: npm ci
      
      - name: 🔨 Compilar Backend (TypeScript)
        working-directory: BackEnd
        run: |
          echo "🔨 Iniciando compilação do Backend..."
          npm run build || {
            echo "❌ Erro na compilação do Backend"
            echo "📋 Verificando se há erros de TypeScript..."
            npx tsc --noEmit 2>&1 | head -50 || true
            exit 1
          }
          echo "✅ Backend compilado com sucesso!"
      
      - name: ✅ Verificar estrutura de arquivos críticos
        working-directory: BackEnd
        run: |
          echo "Verificando arquivos críticos..."
          ERRORS=0
          test -f src/index.ts && echo "✅ src/index.ts existe" || { echo "❌ src/index.ts NÃO existe"; ERRORS=$((ERRORS+1)); }
          test -f src/lib/supabase.ts && echo "✅ src/lib/supabase.ts existe" || { echo "❌ src/lib/supabase.ts NÃO existe"; ERRORS=$((ERRORS+1)); }
          test -d src/services/agents && echo "✅ src/services/agents existe" || { echo "❌ src/services/agents NÃO existe"; ERRORS=$((ERRORS+1)); }
          test -d src/services/flows && echo "✅ src/services/flows existe" || { echo "❌ src/services/flows NÃO existe"; ERRORS=$((ERRORS+1)); }
          test -d src/api/routes && echo "✅ src/api/routes existe" || { echo "❌ src/api/routes NÃO existe"; ERRORS=$((ERRORS+1)); }
          if [ $ERRORS -eq 0 ]; then
            echo "✅ Estrutura de arquivos OK"
          else
            echo "❌ $ERRORS arquivo(s) crítico(s) faltando"
            exit 1
          fi
      
      - name: 🔍 Verificar sintaxe TypeScript (sem compilar)
        working-directory: BackEnd
        run: |
          echo "🔍 Verificando sintaxe TypeScript..."
          if npx tsc --noEmit --skipLibCheck 2>&1; then
            echo "✅ Sintaxe TypeScript OK"
          else
            echo "⚠️ Alguns avisos de tipo encontrados (não crítico)"
            npx tsc --noEmit --skipLibCheck 2>&1 | head -20 || true
          fi

  # ============================================
  # JOB 2: Verificar Frontend
  # ============================================
  frontend-smoke-tests:
    name: Frontend - Compilação e Estrutura
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FrontEnd/package-lock.json
      
      - name: 📥 Instalar dependências do Frontend
        working-directory: FrontEnd
        run: npm ci
      
      - name: 🔨 Compilar Frontend (Vite Build)
        working-directory: FrontEnd
        run: |
          echo "🔨 Iniciando compilação do Frontend..."
          npm run build || {
            echo "❌ Erro na compilação do Frontend"
            exit 1
          }
          echo "✅ Frontend compilado com sucesso!"
        env:
          # Variáveis de ambiente mínimas para build
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-key' }}
      
      - name: ✅ Verificar estrutura de arquivos críticos
        working-directory: FrontEnd
        run: |
          echo "Verificando arquivos críticos..."
          ERRORS=0
          test -f src/main.tsx && echo "✅ src/main.tsx existe" || { echo "❌ src/main.tsx NÃO existe"; ERRORS=$((ERRORS+1)); }
          test -f src/App.tsx && echo "✅ src/App.tsx existe" || { echo "❌ src/App.tsx NÃO existe"; ERRORS=$((ERRORS+1)); }
          test -d src/pages && echo "✅ src/pages existe" || { echo "❌ src/pages NÃO existe"; ERRORS=$((ERRORS+1)); }
          test -d src/components && echo "✅ src/components existe" || { echo "❌ src/components NÃO existe"; ERRORS=$((ERRORS+1)); }
          test -d src/services && echo "✅ src/services existe" || { echo "❌ src/services NÃO existe"; ERRORS=$((ERRORS+1)); }
          if [ $ERRORS -eq 0 ]; then
            echo "✅ Estrutura de arquivos OK"
          else
            echo "❌ $ERRORS arquivo(s) crítico(s) faltando"
            exit 1
          fi
      
      - name: 📦 Verificar build gerado
        working-directory: FrontEnd
        run: |
          if [ -d "build" ]; then
            echo "✅ Diretório build criado"
            if [ -f "build/index.html" ]; then
              echo "✅ build/index.html existe"
              echo "✅ Build gerado com sucesso"
            else
              echo "⚠️ build/index.html não encontrado (build pode ter falhado)"
            fi
          else
            echo "⚠️ Diretório build não encontrado (build pode ter falhado)"
          fi
        continue-on-error: true  # Não falha se build não existir

  # ============================================
  # JOB 3: Verificar SQL Functions
  # ============================================
  sql-functions-check:
    name: SQL Functions - Sintaxe
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Setup PostgreSQL (para verificar sintaxe SQL)
        uses: ankane/setup-postgres@v1
        with:
          postgresql-version: '15'
      
      - name: ✅ Verificar arquivos SQL críticos
        working-directory: BackEnd
        run: |
          echo "Verificando arquivos SQL..."
          SQL_FILES=(
            "CRIAR_FUNCOES_ANALYTICS.sql"
            "CRIAR_FUNCOES_AGENT_FILES.sql"
            "CRIAR_FUNCOES_FILES.sql"
            "CRIAR_TABELA_AGENT_TOKEN_USAGE.sql"
            "CRIAR_TABELA_LLM_PRICING.sql"
            "CRIAR_TABELA_SYSTEM_LOGS.sql"
            "CRIAR_TABELA_ACTIVITY_HISTORY.sql"
          )
          
          for file in "${SQL_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file existe"
            else
              echo "⚠️ $file não encontrado (pode ser opcional)"
            fi
          done
      
      - name: 🔍 Verificar sintaxe SQL básica (sem executar)
        working-directory: BackEnd
        run: |
          echo "Verificando sintaxe SQL básica..."
          # Verifica se arquivos SQL têm estrutura básica válida
          for sql_file in *.sql; do
            if [ -f "$sql_file" ]; then
              # Verifica se tem CREATE FUNCTION ou CREATE TABLE
              if grep -q -i "CREATE\|FUNCTION\|TABLE" "$sql_file" 2>/dev/null; then
                echo "✅ $sql_file parece ter estrutura válida"
              fi
            fi
          done

  # ============================================
  # JOB 4: Verificar Integridade Geral
  # ============================================
  integrity-check:
    name: Integridade - Estrutura e Dependências
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: ✅ Verificar estrutura do projeto
        run: |
          echo "Verificando estrutura do projeto..."
          test -d BackEnd && echo "✅ Diretório BackEnd existe"
          test -d FrontEnd && echo "✅ Diretório FrontEnd existe"
          test -f BackEnd/package.json && echo "✅ BackEnd/package.json existe"
          test -f FrontEnd/package.json && echo "✅ FrontEnd/package.json existe"
      
      - name: 🔍 Verificar dependências críticas
        run: |
          echo "Verificando dependências críticas no BackEnd..."
          grep -q '"express"' BackEnd/package.json && echo "✅ express encontrado"
          grep -q '"@supabase/supabase-js"' BackEnd/package.json && echo "✅ @supabase/supabase-js encontrado"
          grep -q '"typescript"' BackEnd/package.json && echo "✅ typescript encontrado"
          
          echo "Verificando dependências críticas no FrontEnd..."
          grep -q '"react"' FrontEnd/package.json && echo "✅ react encontrado"
          grep -q '"vite"' FrontEnd/package.json && echo "✅ vite encontrado"
          grep -q '"@supabase/supabase-js"' FrontEnd/package.json && echo "✅ @supabase/supabase-js encontrado"
      
      - name: 📋 Resumo
        run: |
          echo "============================================"
          echo "✅ TODOS OS SMOKE TESTS PASSARAM"
          echo "============================================"
          echo ""
          echo "Verificações realizadas:"
          echo "  ✅ Backend compila"
          echo "  ✅ Frontend compila"
          echo "  ✅ Estrutura de arquivos OK"
          echo "  ✅ Dependências críticas presentes"
          echo "  ✅ Arquivos SQL verificados"
          echo ""
          echo "🚀 Pronto para deploy!"
